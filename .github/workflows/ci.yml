name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: nextjs-clearbill-ai/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: nextjs-clearbill-ai

      - name: Check
        run: npm run check
        working-directory: nextjs-clearbill-ai
